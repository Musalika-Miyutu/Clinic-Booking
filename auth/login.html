<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — MediBook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>

  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="22" height="22">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </div>
      <h2>MediBook</h2>
    </div>

    <h3 class="auth-title">Welcome Back</h3>
    <p class="auth-subtitle">Sign in to manage your appointments</p>

    <div class="error-msg" id="login-error"></div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="login-email" class="form-input" placeholder="name@email.com" />
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="password-wrapper">
        <input type="password" id="login-password" class="form-input" placeholder="••••••••" />
        <button class="password-toggle-btn" onclick="togglePw()" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="auth-btn" id="login-btn" onclick="handleLogin()">Sign In</button>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create an account</a>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL      = 'https://yflrorrqgmoveleiucbg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmbHJvcnJxZ21vdmVsZWl1Y2JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMDM1MzYsImV4cCI6MjA5NTg3OTUzNn0.FFJ8SGmH6b1lusN0PR3CPNCBSmEuUcccPSsLm1FubBM';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // If already logged in, go straight to dashboard
    (async () => {
      const { data: { session } } = await db.auth.getSession();
      if (session) window.location.replace('index.html');
    })();

    function togglePw() {
      const pw = document.getElementById('login-password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }

    async function handleLogin() {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn      = document.getElementById('login-btn');
      const errEl    = document.getElementById('login-error');

      errEl.style.display = 'none';
      if (!email || !password) {
        errEl.textContent = 'Please enter your email and password.';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Signing in…';
      btn.disabled = true;

      try {
        const { data, error } = await db.auth.signInWithPassword({ email, password });
        if (error) throw error;

        try {
          // Save pending profile if registration couldn't insert it (email confirm was ON)
          const pending = localStorage.getItem('pending_profile');
          if (pending) {
            const prof = JSON.parse(pending);
            prof.id = data.user.id; // ensure correct id
            await db.from('profiles').insert(prof).select();
            localStorage.removeItem('pending_profile');
          }

          const { data: profile } = await db.from('profiles').select('role').eq('id', data.user.id).single();
          window.location.replace(profile?.role === 'admin' ? 'admin/index.html' : 'index.html');
        } catch {
          window.location.replace('index.html');
        }
      } catch(err) {
        errEl.textContent = err.message || 'Invalid email or password.';
        errEl.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
