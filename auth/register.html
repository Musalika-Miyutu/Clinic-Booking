<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — MediBook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="../css/auth.css">
  <style>
    body { align-items: flex-start; padding: 40px 20px; }
    .auth-card { max-width: 480px; }
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="22" height="22">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </div>
      <h2>MediBook</h2>
    </div>

    <h3 class="auth-title">Create Account</h3>
    <p class="auth-subtitle">Join MediBook — it's free</p>

    <div class="error-msg"   id="reg-error"></div>
    <div class="success-msg" id="reg-success">
      ✅ Account created! <a href="login.html">Click here to sign in</a>.
    </div>

    <div class="section-divider">Personal Information</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">First Name *</label>
        <input class="form-input" id="reg-firstname" placeholder="James" />
      </div>
      <div class="form-group">
        <label class="form-label">Last Name *</label>
        <input class="form-input" id="reg-lastname" placeholder="Mwale" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <input class="form-input" id="reg-phone" placeholder="+260 977 000 000" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date of Birth</label>
        <input class="form-input" type="date" id="reg-dob" />
      </div>
      <div class="form-group">
        <label class="form-label">Blood Type</label>
        <select class="form-select" id="reg-blood">
          <option value="">Unknown</option>
          <option>A+</option><option>A-</option>
          <option>B+</option><option>B-</option>
          <option>O+</option><option>O-</option>
          <option>AB+</option><option>AB-</option>
        </select>
      </div>
    </div>

    <div class="section-divider">Account Details</div>
    <div class="form-group">
      <label class="form-label">Email Address *</label>
      <input class="form-input" type="email" id="reg-email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label class="form-label">Password *</label>
      <div class="password-wrapper">
        <input class="form-input" type="password" id="reg-password" placeholder="At least 8 characters" />
        <button class="password-toggle-btn" onclick="togglePw('reg-password')" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password *</label>
      <div class="password-wrapper">
        <input class="form-input" type="password" id="reg-confirm" placeholder="Repeat your password" />
        <button class="password-toggle-btn" onclick="togglePw('reg-confirm')" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="auth-btn" id="reg-btn" onclick="handleRegister()">Create Account</button>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL      = 'https://yflrorrqgmoveleiucbg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmbHJvcnJxZ21vdmVsZWl1Y2JnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMDM1MzYsImV4cCI6MjA5NTg3OTUzNn0.FFJ8SGmH6b1lusN0PR3CPNCBSmEuUcccPSsLm1FubBM';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    (async () => {
      const { data: { session } } = await db.auth.getSession();
      if (session) window.location.replace('index.html');
    })();

    function togglePw(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    async function handleRegister() {
      const firstName = document.getElementById('reg-firstname').value.trim();
      const lastName  = document.getElementById('reg-lastname').value.trim();
      const phone     = document.getElementById('reg-phone').value.trim();
      const dob       = document.getElementById('reg-dob').value;
      const blood     = document.getElementById('reg-blood').value;
      const email     = document.getElementById('reg-email').value.trim();
      const password  = document.getElementById('reg-password').value;
      const confirm   = document.getElementById('reg-confirm').value;
      const btn       = document.getElementById('reg-btn');
      const errEl     = document.getElementById('reg-error');
      const sucEl     = document.getElementById('reg-success');

      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      if (!firstName || !lastName || !email || !password) {
        errEl.textContent = 'Please fill in all required fields (marked *).';
        errEl.style.display = 'block'; return;
      }
      if (password.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.';
        errEl.style.display = 'block'; return;
      }
      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block'; return;
      }

      btn.textContent = 'Creating account…';
      btn.disabled = true;

      try {
        // Step 1 — create auth user
        console.log('Step 1: Signing up...');
        const { data: signUpData, error: signUpError } = await db.auth.signUp({ email, password });
        console.log('SignUp result:', { user: signUpData?.user?.id, session: !!signUpData?.session, error: signUpError?.message });
        if (signUpError) throw signUpError;

        const user = signUpData.user;
        if (!user) throw new Error('No user returned from signup.');

        // Step 2 — use session from signup (email confirm OFF) or sign in
        let session = signUpData.session;
        console.log('Step 2: Session from signup:', !!session);

        if (!session) {
          console.log('No session — trying immediate sign in...');
          const { data: signInData, error: signInError } = await db.auth.signInWithPassword({ email, password });
          console.log('SignIn result:', { session: !!signInData?.session, error: signInError?.message });
          if (!signInError) session = signInData.session;
        }

        // Step 3 — insert profile
        if (session) {
          console.log('Step 3: Inserting profile for', user.id);
          const profileData = {
            id:        user.id,
            full_name: `${firstName} ${lastName}`.trim(),
            email:     email,
            role:      'patient',
          };
          if (phone) profileData.phone         = phone;
          if (dob)   profileData.date_of_birth = dob;
          if (blood) profileData.blood_type    = blood;

          const { data: profData, error: profileError } = await db.from('profiles').insert(profileData).select();
          console.log('Profile insert result:', { data: profData, error: profileError?.message });
          if (profileError) throw new Error('Profile save failed: ' + profileError.message);

          await db.auth.signOut();
        } else {
          console.warn('No session available — storing pending profile');
          localStorage.setItem('pending_profile', JSON.stringify({
            id: user.id, full_name: `${firstName} ${lastName}`.trim(),
            email, role: 'patient',
            phone: phone || null, date_of_birth: dob || null, blood_type: blood || null
          }));
        }

        sucEl.style.display  = 'block';
        btn.textContent      = 'Account Created ✓';
        btn.style.background = '#2db67d';

      } catch(err) {
        console.error('Registration error:', err);
        errEl.textContent = err.message || 'Registration failed. Please try again.';
        errEl.style.display = 'block';
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });
  </script>
</body>
</html>
